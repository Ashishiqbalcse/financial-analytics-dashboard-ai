services:
  - type: web
    name: financial-analytics-backend
    runtime: python

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: DATABASE_URL
        sync: false

      - key: REDIS_HOST
        sync: false

      - key: REDIS_PORT
        sync: false

      - key: REDIS_PASSWORD
        sync: false

      - key: OPENAI_API_KEY
        sync: false

      - key: ALPHA_VANTAGE_API_KEY
        sync: false